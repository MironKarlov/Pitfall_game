<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pitfall!</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        .game-container {
            text-align: center;
            background: #16213e;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        canvas {
            border: 3px solid #e94560;
            border-radius: 10px;
            display: block;
            margin: 0 auto;
            touch-action: none;
        }
        .controls {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        button {
            width: 80px;
            height: 80px;
            font-size: 32px;
            font-weight: bold;
            background: #0f3460;
            color: white;
            border: 3px solid #e94560;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 5px 0 #0a1628;
            transition: all 0.05s;
            touch-action: manipulation;
        }
        button:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #0a1628;
        }
        .stats {
            color: white;
            font-size: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            padding: 0 10px;
        }
        .title {
            color: #e94560;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0 #0a1628;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="title">🏃 PITFALL! 🐊</div>
    <div class="stats">
        <span>❤️ <span id="lives">3</span></span>
        <span>💰 <span id="score">0000</span></span>
    </div>
    <canvas id="gameCanvas" width="600" height="300"></canvas>
    <div class="controls">
        <button id="leftBtn">←</button>
        <button id="jumpBtn">⬆️</button>
        <button id="rightBtn">→</button>
    </div>
    <div style="margin-top: 15px;">
        <button id="restartBtn" style="width: auto; height: 50px; font-size: 18px; padding: 0 30px;">
            🔄 Новая игра
        </button>
    </div>
</div>

<script>
// ============================================
// PITFALL! - Полноценная 2D игра на Canvas
// ============================================

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Размеры
const W = 600, H = 300;
const GROUND_Y = 260;

// Состояние игры
let game = {
    player: { x: 100, y: GROUND_Y - 35, vy: 0, width: 25, height: 35, onGround: true },
    lives: 3,
    score: 0,
    cameraX: 0,
    gameOver: false,
    win: false
};

// Уровень
let world = {
    platforms: [],
    pits: [],
    vines: [],
    enemies: [],
    treasure: null
};

// Управление
const keys = { left: false, right: false };

// ========== ГЕНЕРАЦИЯ УРОВНЯ ==========
function generateWorld() {
    world = { platforms: [], pits: [], vines: [], enemies: [], treasure: null };
    
    let x = 0;
    const endX = 2500;
    
    while (x < endX) {
        const r = Math.random();
        
        if (r < 0.15 && x > 200) {
            // Яма
            const width = 40 + Math.floor(Math.random() * 50);
            world.pits.push({ x, y: GROUND_Y, width });
            x += width;
        } else {
            // Платформа
            const width = 80 + Math.floor(Math.random() * 120);
            world.platforms.push({ x, y: GROUND_Y, width, height: 20 });
            
            // Лиана над платформой
            if (Math.random() < 0.2 && x > 300) {
                const vineX = x + width / 2;
                const vineH = 80 + Math.floor(Math.random() * 60);
                world.vines.push({ x: vineX, y: GROUND_Y - vineH, height: vineH });
            }
            
            // Враг (крокодил)
            if (Math.random() < 0.15 && width > 100) {
                world.enemies.push({
                    x: x + 30 + Math.random() * (width - 60),
                    y: GROUND_Y - 20,
                    width: 40,
                    height: 18,
                    dir: Math.random() > 0.5 ? 1 : -1,
                    startX: x + 30,
                    range: 60
                });
            }
            
            x += width;
        }
    }
    
    // Сокровище в конце
    world.treasure = { x: endX - 100, y: GROUND_Y - 35, width: 35, height: 30, collected: false };
}

// ========== ФИЗИКА ==========
function update() {
    if (game.gameOver || game.win) return;
    
    const p = game.player;
    
    // Гравитация
    p.vy += 0.5;
    p.y += p.vy;
    p.onGround = false;
    
    // Коллизия с платформами
    for (const pl of world.platforms) {
        if (p.x < pl.x + pl.width && p.x + p.width > pl.x) {
            if (p.y + p.height > pl.y && p.y + p.height < pl.y + pl.height + 10 && p.vy >= 0) {
                p.y = pl.y - p.height;
                p.vy = 0;
                p.onGround = true;
            }
        }
    }
    
    // Движение
    if (keys.left) p.x -= 4;
    if (keys.right) p.x += 4;
    p.x = Math.max(0, Math.min(p.x, 2500 - p.width));
    
    // Враги
    for (const e of world.enemies) {
        e.x += e.dir * 1.5;
        if (Math.abs(e.x - e.startX) > e.range) e.dir *= -1;
        
        // Коллизия с игроком
        if (!game.player.invulnerable) {
            if (p.x < e.x + e.width && p.x + p.width > e.x &&
                p.y < e.y + e.height && p.y + p.height > e.y) {
                game.lives--;
                game.player.invulnerable = true;
                setTimeout(() => game.player.invulnerable = false, 1000);
                p.x = 100;
                p.y = GROUND_Y - 35;
                if (game.lives <= 0) game.gameOver = true;
            }
        }
    }
    
    // Падение в яму
    for (const pit of world.pits) {
        if (p.x + p.width > pit.x && p.x < pit.x + pit.width) {
            if (p.y + p.height >= GROUND_Y) {
                game.lives--;
                p.x = 100;
                p.y = GROUND_Y - 35;
                p.vy = 0;
                if (game.lives <= 0) game.gameOver = true;
            }
        }
    }
    
    // Сокровище
    const t = world.treasure;
    if (t && !t.collected) {
        if (p.x < t.x + t.width && p.x + p.width > t.x &&
            p.y < t.y + t.height && p.y + p.height > t.y) {
            t.collected = true;
            game.score += 1000;
            game.win = true;
        }
    }
    
    // Камера
    game.cameraX = Math.max(0, Math.min(p.x - 200, 2500 - W));
    
    // UI
    document.getElementById('lives').textContent = game.lives;
    document.getElementById('score').textContent = String(game.score).padStart(4, '0');
}

// ========== ОТРИСОВКА ==========
function draw() {
    ctx.clearRect(0, 0, W, H);
    
    // Небо
    const gradient = ctx.createLinearGradient(0, 0, 0, H);
    gradient.addColorStop(0, '#87CEEB');
    gradient.addColorStop(1, '#E0F0FF');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, W, H);
    
    // Солнце
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.arc(500 - game.cameraX * 0.1, 50, 35, 0, Math.PI * 2);
    ctx.fill();
    
    // Облака
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    for (let i = 0; i < 5; i++) {
        const cloudX = ((i * 200) - game.cameraX * 0.3) % (W + 200) - 100;
        ctx.beginPath();
        ctx.arc(cloudX, 70, 25, 0, Math.PI * 2);
        ctx.arc(cloudX + 30, 55, 20, 0, Math.PI * 2);
        ctx.arc(cloudX + 55, 70, 22, 0, Math.PI * 2);
        ctx.fill();
    }
    
    const cam = game.cameraX;
    
    // Платформы
    ctx.fillStyle = '#8B4513';
    for (const pl of world.platforms) {
        ctx.fillRect(pl.x - cam, pl.y, pl.width, pl.height);
        // Трава сверху
        ctx.fillStyle = '#228B22';
        ctx.fillRect(pl.x - cam, pl.y - 3, pl.width, 5);
        ctx.fillStyle = '#8B4513';
    }
    
    // Ямы
    ctx.fillStyle = '#1a1a2e';
    for (const pit of world.pits) {
        ctx.fillRect(pit.x - cam, pit.y, pit.width, 40);
        // Вода
        ctx.fillStyle = '#1E90FF';
        ctx.fillRect(pit.x - cam, pit.y + 10, pit.width, 15);
        ctx.fillStyle = '#1a1a2e';
    }
    
    // Лианы
    ctx.strokeStyle = '#2E8B57';
    ctx.lineWidth = 8;
    for (const v of world.vines) {
        ctx.beginPath();
        ctx.moveTo(v.x - cam, v.y);
        ctx.lineTo(v.x - cam, v.y + v.height);
        ctx.stroke();
        // Листья
        ctx.fillStyle = '#32CD32';
        ctx.beginPath();
        ctx.ellipse(v.x - cam - 8, v.y + 20, 8, 5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(v.x - cam + 8, v.y + 50, 8, 5, 0, 0, Math.PI * 2);
        ctx.fill();
    }
    
    // Враги (крокодилы)
    for (const e of world.enemies) {
        // Тело
        ctx.fillStyle = '#006400';
        ctx.fillRect(e.x - cam, e.y, e.width, e.height);
        // Шипы
        ctx.fillStyle = '#004d00';
        for (let i = 0; i < e.width; i += 8) {
            ctx.beginPath();
            ctx.moveTo(e.x - cam + i, e.y);
            ctx.lineTo(e.x - cam + i + 4, e.y - 6);
            ctx.lineTo(e.x - cam + i + 8, e.y);
            ctx.fill();
        }
        // Глаза
        ctx.fillStyle = '#FFFF00';
        ctx.beginPath();
        ctx.arc(e.x - cam + 8, e.y + 6, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(e.x - cam + e.width - 8, e.y + 6, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(e.x - cam + (e.dir > 0 ? 10 : 6), e.y + 6, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(e.x - cam + e.width - (e.dir > 0 ? 6 : 10), e.y + 6, 2, 0, Math.PI * 2);
        ctx.fill();
    }
    
    // Сокровище
    const t = world.treasure;
    if (t && !t.collected) {
        // Сундук
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(t.x - cam, t.y, t.width, t.height);
        ctx.fillStyle = '#DAA520';
        ctx.fillRect(t.x - cam, t.y, t.width, 8);
        ctx.fillStyle = '#FFD700';
        ctx.beginPath();
        ctx.arc(t.x - cam + t.width/2, t.y - 2, 5, 0, Math.PI * 2);
        ctx.fill();
    }
    
    // Игрок
    const p = game.player;
    if (!game.player.invulnerable || Math.floor(Date.now() / 100) % 2 === 0) {
        // Тень
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.beginPath();
        ctx.ellipse(p.x - cam + p.width/2, GROUND_Y + 3, 15, 5, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Тело
        ctx.fillStyle = '#FFD700';
        ctx.fillRect(p.x - cam, p.y, p.width, p.height);
        ctx.fillStyle = '#FFA500';
        ctx.fillRect(p.x - cam + 2, p.y + 2, p.width - 4, p.height - 4);
        
        // Шляпа
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(p.x - cam - 3, p.y - 8, p.width + 6, 10);
        ctx.fillRect(p.x - cam + 5, p.y - 12, p.width - 10, 6);
        
        // Глаза
        ctx.fillStyle = '#FFF';
        ctx.beginPath();
        ctx.arc(p.x - cam + 18, p.y + 12, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(p.x - cam + (keys.right ? 20 : 16), p.y + 12, 2, 0, Math.PI * 2);
        ctx.fill();
    }
    
    // Сообщения
    if (game.gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, W, H);
        ctx.font = 'bold 36px Arial';
        ctx.fillStyle = '#FF4444';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', W/2, H/2);
    }
    if (game.win) {
        ctx.fillStyle = 'rgba(0,50,0,0.7)';
        ctx.fillRect(0, 0, W, H);
        ctx.font = 'bold 32px Arial';
        ctx.fillStyle = '#FFD700';
        ctx.textAlign = 'center';
        ctx.fillText('СОКРОВИЩЕ НАЙДЕНО!', W/2, H/2);
        ctx.font = '24px Arial';
        ctx.fillText('Score: ' + game.score, W/2, H/2 + 50);
    }
}

// ========== ИГРОВОЙ ЦИКЛ ==========
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// ========== УПРАВЛЕНИЕ ==========
document.getElementById('leftBtn').addEventListener('mousedown', (e) => { e.preventDefault(); keys.left = true; });
document.getElementById('leftBtn').addEventListener('mouseup', () => keys.left = false);
document.getElementById('leftBtn').addEventListener('mouseleave', () => keys.left = false);
document.getElementById('leftBtn').addEventListener('touchstart', (e) => { e.preventDefault(); keys.left = true; });
document.getElementById('leftBtn').addEventListener('touchend', () => keys.left = false);

document.getElementById('rightBtn').addEventListener('mousedown', (e) => { e.preventDefault(); keys.right = true; });
document.getElementById('rightBtn').addEventListener('mouseup', () => keys.right = false);
document.getElementById('rightBtn').addEventListener('mouseleave', () => keys.right = false);
document.getElementById('rightBtn').addEventListener('touchstart', (e) => { e.preventDefault(); keys.right = true; });
document.getElementById('rightBtn').addEventListener('touchend', () => keys.right = false);

document.getElementById('jumpBtn').addEventListener('mousedown', (e) => {
    e.preventDefault();
    if (game.player.onGround && !game.gameOver && !game.win) {
        game.player.vy = -8;
    }
});
document.getElementById('jumpBtn').addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (game.player.onGround && !game.gameOver && !game.win) {
        game.player.vy = -8;
    }
});

document.getElementById('restartBtn').addEventListener('click', () => {
    generateWorld();
    game = {
        player: { x: 100, y: GROUND_Y - 35, vy: 0, width: 25, height: 35, onGround: true, invulnerable: false },
        lives: 3,
        score: 0,
        cameraX: 0,
        gameOver: false,
        win: false
    };
});

// Клавиатура
window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') { e.preventDefault(); keys.left = true; }
    if (e.key === 'ArrowRight') { e.preventDefault(); keys.right = true; }
    if (e.key === ' ' || e.key === 'Space') {
        e.preventDefault();
        if (game.player.onGround && !game.gameOver && !game.win) game.player.vy = -8;
    }
});
window.addEventListener('keyup', (e) => {
    if (e.key === 'ArrowLeft') { e.preventDefault(); keys.left = false; }
    if (e.key === 'ArrowRight') { e.preventDefault(); keys.right = false; }
});

// Старт!
generateWorld();
gameLoop();
</script>
</body>
</html>
