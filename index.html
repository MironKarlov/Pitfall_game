<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🏃 PITFALL!</title>
    <style>
        body { margin:0; padding:10px; background:#1a1a2e; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:Arial; }
        .game { text-align:center; background:#16213e; padding:15px; border-radius:20px; }
        canvas { border:3px solid #e94560; border-radius:10px; touch-action:none; }
        .btns { margin-top:15px; display:flex; justify-content:center; gap:10px; flex-wrap:wrap; }
        button { width:70px; height:70px; font-size:30px; background:#0f3460; color:white; border:3px solid #e94560; border-radius:15px; touch-action:manipulation; }
        .stats { color:white; font-size:18px; margin-bottom:10px; display:flex; justify-content:space-between; }
    </style>
</head>
<body>
<div class="game">
    <div class="stats"><span>❤️ <span id="lives">3</span></span><span>💰 <span id="score">0000</span></span></div>
    <canvas id="gameCanvas" width="600" height="300"></canvas>
    <div class="btns">
        <button id="leftBtn">←</button>
        <button id="jumpBtn">⬆️</button>
        <button id="rightBtn">→</button>
    </div>
    <button id="restartBtn" style="width:auto; height:45px; font-size:16px; margin-top:10px;">🔄 Заново</button>
</div>
<script>
// ========== PITFALL! ==========
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 600, H = 300, GROUND = 260;

let game = {
    player: { x:100, y:GROUND-35, vy:0, w:25, h:35, onGround:true },
    lives:3, score:0, camX:0, over:false, win:false
};

let world = { plats:[], pits:[], vines:[], enemies:[], treasure:null };
const keys = { left:false, right:false };

// Генерация
function gen() {
    world = { plats:[], pits:[], vines:[], enemies:[], treasure:null };
    let x = 0;
    while (x < 2500) {
        if (Math.random() < 0.15 && x > 200) {
            let w = 40 + Math.floor(Math.random()*50);
            world.pits.push({ x, y:GROUND, w });
            x += w;
        } else {
            let w = 80 + Math.floor(Math.random()*120);
            world.plats.push({ x, y:GROUND, w, h:20 });
            if (Math.random() < 0.2 && x > 300) world.vines.push({ x: x+w/2, y:GROUND-100, h:80 });
            if (Math.random() < 0.15 && w > 100) world.enemies.push({ x:x+40, y:GROUND-20, w:40, h:18, dir:1, startX:x+40, range:60 });
            x += w;
        }
    }
    world.treasure = { x:2400, y:GROUND-35, w:35, h:30, taken:false };
}

// Обновление
function upd() {
    if (game.over || game.win) return;
    let p = game.player;
    p.vy += 0.5; p.y += p.vy; p.onGround = false;
    
    world.plats.forEach(pl => {
        if (p.x < pl.x+pl.w && p.x+p.w > pl.x && p.y+p.h > pl.y && p.y+p.h < pl.y+pl.h+10 && p.vy >= 0)
            { p.y = pl.y-p.h; p.vy = 0; p.onGround = true; }
    });
    
    if (keys.left) p.x -= 4;
    if (keys.right) p.x += 4;
    p.x = Math.max(0, Math.min(p.x, 2500-p.w));
    
    world.enemies.forEach(e => {
        e.x += e.dir*1.5;
        if (Math.abs(e.x-e.startX) > e.range) e.dir *= -1;
        if (!p.invuln && p.x<e.x+e.w && p.x+p.w>e.x && p.y<e.y+e.h && p.y+p.h>e.y) {
            game.lives--; p.invuln=true; setTimeout(()=>p.invuln=false,1000);
            p.x=100; p.y=GROUND-35; if (game.lives<=0) game.over=true;
        }
    });
    
    world.pits.forEach(pit => {
        if (p.x+p.w > pit.x && p.x < pit.x+pit.w && p.y+p.h >= GROUND) {
            game.lives--; p.x=100; p.y=GROUND-35; p.vy=0; if (game.lives<=0) game.over=true;
        }
    });
    
    let t = world.treasure;
    if (t && !t.taken && p.x<t.x+t.w && p.x+p.w>t.x && p.y<t.y+t.h && p.y+p.h>t.y)
        { t.taken=true; game.score+=1000; game.win=true; }
    
    game.camX = Math.max(0, Math.min(p.x-200, 2500-W));
    document.getElementById('lives').textContent = game.lives;
    document.getElementById('score').textContent = String(game.score).padStart(4,'0');
}

// Отрисовка
function draw() {
    ctx.clearRect(0,0,W,H);
    let cam = game.camX;
    // Небо
    let grad = ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,'#87CEEB'); grad.addColorStop(1,'#E0F0FF');
    ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);
    // Солнце
    ctx.fillStyle='#FFD700'; ctx.beginPath(); ctx.arc(500-cam*0.1,50,35,0,Math.PI*2); ctx.fill();
    
    // Платформы
    world.plats.forEach(p => {
        ctx.fillStyle='#8B4513'; ctx.fillRect(p.x-cam, p.y, p.w, p.h);
        ctx.fillStyle='#228B22'; ctx.fillRect(p.x-cam, p.y-3, p.w, 5);
    });
    // Ямы
    world.pits.forEach(p => {
        ctx.fillStyle='#1a1a2e'; ctx.fillRect(p.x-cam, p.y, p.w, 40);
        ctx.fillStyle='#1E90FF'; ctx.fillRect(p.x-cam, p.y+10, p.w, 15);
    });
    // Враги
    world.enemies.forEach(e => {
        ctx.fillStyle='#006400'; ctx.fillRect(e.x-cam, e.y, e.w, e.h);
        ctx.fillStyle='#FFFF00'; ctx.beginPath(); ctx.arc(e.x-cam+10, e.y+6, 4, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(e.x-cam+(e.dir>0?12:8), e.y+6, 2, 0, Math.PI*2); ctx.fill();
    });
    // Сокровище
    let t = world.treasure;
    if (t && !t.taken) {
        ctx.fillStyle='#8B4513'; ctx.fillRect(t.x-cam, t.y, t.w, t.h);
        ctx.fillStyle='#FFD700'; ctx.beginPath(); ctx.arc(t.x-cam+t.w/2, t.y-2, 5, 0, Math.PI*2); ctx.fill();
    }
    
    // ЧЕЛОВЕЧЕК 🏃
    let p = game.player;
    if (!p.invuln || Math.floor(Date.now()/100)%2===0) {
        let px = p.x - cam, py = p.y;
        // Тень
        ctx.fillStyle='rgba(0,0,0,0.2)'; ctx.beginPath(); ctx.ellipse(px+p.w/2, GROUND+3, 18, 5, 0, 0, Math.PI*2); ctx.fill();
        
        let leg = (Date.now()/80) % (Math.PI*2);
        let move = keys.left || keys.right;
        let swing = move ? Math.sin(leg)*8 : 0;
        let lean = move ? (keys.right?3:-3) : 0;
        
        // Ноги
        ctx.fillStyle='#4A3728';
        ctx.beginPath(); ctx.moveTo(px+8, py+p.h-8); ctx.lineTo(px+4+swing*0.5, py+p.h+4); ctx.lineTo(px+12, py+p.h+4); ctx.fill();
        ctx.beginPath(); ctx.moveTo(px+p.w-8, py+p.h-8); ctx.lineTo(px+p.w-4-swing*0.5, py+p.h+4); ctx.lineTo(px+p.w, py+p.h+4); ctx.fill();
        // Тело
        ctx.fillStyle='#C41E3A'; ctx.strokeStyle='#8B0000'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.roundRect(px+4+lean, py+8, p.w-8, p.h-16, 5); ctx.fill(); ctx.stroke();
        // Ремень
        ctx.fillStyle='#2F1B0E'; ctx.fillRect(px+3+lean, py+p.h-12, p.w-6, 4);
        // Руки
        let arm = move ? Math.sin(leg+Math.PI)*6 : 0;
        ctx.beginPath(); ctx.moveTo(px+6+lean, py+12); ctx.lineTo(px-2+lean+arm, py+20); ctx.lineTo(px+2+lean+arm, py+26);
        ctx.lineWidth=5; ctx.strokeStyle='#C41E3A'; ctx.stroke();
        ctx.beginPath(); ctx.moveTo(px+p.w-6+lean, py+12); ctx.lineTo(px+p.w+2+lean-arm, py+20); ctx.lineTo(px+p.w-2+lean-arm, py+26); ctx.stroke();
        // Кисти
        ctx.fillStyle='#FFDAB9'; ctx.beginPath(); ctx.arc(px+lean+arm, py+26, 3.5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(px+p.w-2+lean-arm, py+26, 3.5, 0, Math.PI*2); ctx.fill();
        // Голова
        ctx.fillStyle='#FFDAB9';
        ctx.fillRect(px+10+lean, py+2, 6, 8);
        ctx.beginPath(); ctx.ellipse(px+p.w/2+lean, py-2, 12, 14, 0, 0, Math.PI*2); ctx.fill(); ctx.strokeStyle='#E8B89D'; ctx.stroke();
        // Шляпа
        ctx.fillStyle='#8B7355';
        ctx.beginPath(); ctx.ellipse(px+p.w/2+lean, py-10, 18, 5, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(px+p.w/2+lean, py-18, 11, 8, 0, 0, Math.PI*2); ctx.fill();
        // Глаза
        ctx.fillStyle='#FFF';
        ctx.beginPath(); ctx.arc(px+9+lean+(keys.right?2:0), py-4, 3, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(px+17+lean+(keys.right?2:0), py-4, 3, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle='#2C1810';
        let look = keys.right ? 1.5 : (keys.left ? -1.5 : 0);
        ctx.beginPath(); ctx.arc(px+9+lean+look, py-4, 2, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(px+17+lean+look, py-4, 2, 0, Math.PI*2); ctx.fill();
        // Улыбка
        ctx.strokeStyle='#C0755A'; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.arc(px+p.w/2+lean, py+2, 5, 0.1, Math.PI-0.1); ctx.stroke();
    }
    
    if (game.over) { ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,0,W,H); ctx.font='bold 36px Arial'; ctx.fillStyle='#F44'; ctx.textAlign='center'; ctx.fillText('GAME OVER',W/2,H/2); }
    if (game.win) { ctx.fillStyle='rgba(0,50,0,0.7)'; ctx.fillRect(0,0,W,H); ctx.font='bold 32px Arial'; ctx.fillStyle='#FFD700'; ctx.fillText('СОКРОВИЩЕ!',W/2,H/2); }
}

CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r) {
    this.moveTo(x+r, y); this.lineTo(x+w-r, y); this.quadraticCurveTo(x+w, y, x+w, y+r);
    this.lineTo(x+w, y+h-r); this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    this.lineTo(x+r, y+h); this.quadraticCurveTo(x, y+h, x, y+h-r);
    this.lineTo(x, y+r); this.quadraticCurveTo(x, y, x+r, y); return this;
};

function loop() { upd(); draw(); requestAnimationFrame(loop); }

// Управление
document.getElementById('leftBtn').addEventListener('touchstart', e => { e.preventDefault(); keys.left=true; });
document.getElementById('leftBtn').addEventListener('touchend', () => keys.left=false);
document.getElementById('rightBtn').addEventListener('touchstart', e => { e.preventDefault(); keys.right=true; });
document.getElementById('rightBtn').addEventListener('touchend', () => keys.right=false);
document.getElementById('jumpBtn').addEventListener('touchstart', e => {
    e.preventDefault();
    if (game.player.onGround && !game.over && !game.win) game.player.vy = -8;
});
document.getElementById('restartBtn').addEventListener('click', () => {
    gen();
    game = { player:{ x:100, y:GROUND-35, vy:0, w:25, h:35, onGround:true }, lives:3, score:0, camX:0, over:false, win:false };
});

gen(); loop();
</script>
</body>
</html>
